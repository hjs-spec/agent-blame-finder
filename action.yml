name: "Agent Blackbox Incident Review"
description: "Review Agent Blackbox JEP/HJS/JAC trace artifacts"
author: "HJS Spec"

branding:
  icon: "search"
  color: "black"

inputs:
  event_hash:
    description: "Event hash to review"
    required: true
  storage_path:
    description: "Path to blackbox logs"
    required: false
    default: "./blackbox_logs"

outputs:
  review_result:
    description: "Incident review result JSON"
  candidate_failure_node:
    description: "Candidate failure node for human review"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Agent Blackbox
      run: pip install agent-blackbox
      shell: bash
    - name: Run incident review
      id: review
      run: |
        agent-blackbox --storage "${{ inputs.storage_path }}" review "${{ inputs.event_hash }}" > /tmp/agent-blackbox-review.json
        node=$(python -c 'import json; print(json.load(open("/tmp/agent-blackbox-review.json")).get("candidate_failure_node", ""))')
        {
          echo "review_result<<EOF"
          cat /tmp/agent-blackbox-review.json
          echo "EOF"
          echo "candidate_failure_node=$node"
        } >> "$GITHUB_OUTPUT"
      shell: bash
